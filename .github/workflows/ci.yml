name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts-mcp:
    name: '@fdkey/mcp (TS)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm test

  http:
    name: '@fdkey/http (TS)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: http
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm test

  python:
    name: 'fdkey (Python)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  rust:
    name: 'fdkey (Rust)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
